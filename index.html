<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <title>Convert Money - AJDev</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <img src="./assets/logo.gif" alt="Logo DevExercícios" class="logo">

    <main>
        <label>
            Converter <b>de</b>
            <select type="number" class="currency-select-from" placeholder="Selecione">
                <option value="BRL">Real (R$)</option>
                <option value="USD">Dólar (US$)</option>
                <option value="EUR">Euro (€)</option>
                <option value="BTC">Bitcoin (₿)</option>
            </select>
        </label>

        <label>Converter <b>para</b>
            <select type="number" class="currency-select-to" placeholder="Selecione">
                <option value="BRL">Real (R$)</option>
                <option value="USD">Dólar (US$)</option>
                <option value="EUR">Euro (€)</option>
                <option value="BTC">Bitcoin (₿)</option>
            </select>
        </label>

        <label>Valor
            <input type="number" class="input-currency" placeholder="Valor a ser convertido">
        </label>

        <button class="btn-convert">Converter</button>

        <section>
            <div class="currency-box">
                <img src="./assets/brl.png" alt="logo-moeda-a-converter">
                <p class="currency">Real</p>
                <p class="currency-value-to-convert">R$ 0,00</p>
            </div>

            <img src="./assets/arrow.png" alt="Seta" class="arrow-img">

            <div class="currency-box">
                <img src="./assets/usd.png" alt="logo-moeda-convertida" class="currency-img">
                <p class="currency" id="currency-name">Dólar americano</p>
                <p class="currency-value-converted">U$ 0.0</p>
            </div>

        </section>

    </main>
</body>
<script src="script.js"></script>

</html>
